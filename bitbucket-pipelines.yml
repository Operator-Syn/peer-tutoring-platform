image: alpine/git

pipelines:
  custom:
    mirror-to-github:
      - step:
          name: Mirror to GitHub
          script:
            # 1. Add GitHub remote
            - git remote add github https://$GITHUB_USERNAME:$GITHUB_TOKEN@github.com/Operator-Syn/peer-tutoring-platform.git
            
            # 2. Fetch everything from the source
            - git fetch --all
            
            # 3. Mirror all branches
            # This replaces your loop and handles the 'main' push error by using --force
            - git push github --all --force
            
            # 4. Mirror all tags
            - git push github --tags --force